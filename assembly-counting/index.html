<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e3a8a" />
  <meta name="description" content="Assembly Counting tool for Munich Assembly Hall." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Assembly Counting" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="Assembly-counting-icon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="Assembly-counting-icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="Assembly-counting-icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="Assembly-counting-icon-180.png" />
  <title>Assembly Counting Munich</title>
  <style>
    :root {
      --bg: #f3f5f7;
      --card: #ffffff;
      --ink: #22303c;
      --muted: #627282;
      --line: #d6dee6;
      --accent: #214b69;
      --accent-soft: #eef4f8;
      --danger: #8a2f2f;
      --print-line: #8f99a2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(243,245,247,.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .toolbar-inner,
    .app {
      max-width: 1320px;
      margin: 0 auto;
      padding: 14px 18px;
    }

    .toolbar-panel {
      background: linear-gradient(180deg, #fdfefe, #eef4f8);
      border: 1px solid #d8e1e8;
      border-radius: 18px;
      padding: 14px 16px 12px;
      box-shadow: 0 10px 22px rgba(33, 75, 105, 0.08);
    }

    .headline {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
    }

    .sub {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    .summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 13px;
      white-space: nowrap;
    }

    .pill.total-pill {
      padding: 10px 16px;
      border-width: 2px;
      box-shadow: 0 6px 18px rgba(33, 75, 105, 0.10);
      font-size: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f1f7fb 100%);
    }

    .pill.total-pill strong {
      font-size: 24px;
      color: var(--accent);
      margin-left: 5px;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    button {
      font: inherit;
    }

    .toolbar input[type="text"],
    .toolbar textarea {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      min-width: 0;
    }

    button {
      padding: 9px 12px;
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      font-weight: 700;
      color: var(--ink);
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.danger {
      color: var(--danger);
    }

    .control-grid {
      display: grid;
      gap: 10px;
      align-items: start;
    }

    .control-row-primary {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: start;
    }

    .control-row-secondary {
      display: grid;
      grid-template-columns: minmax(300px, 1.6fr) minmax(220px, 1fr) minmax(154px, 170px);
      gap: 10px;
      align-items: center;
    }

    .control-row-actions {
      display: grid;
      grid-template-columns: repeat(5, minmax(148px, 1fr));
      gap: 10px;
      align-items: center;
    }

    .event-stack {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .event-stack input {
      font-size: 15px;
      font-weight: 600;
    }

    .time-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .time-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .time-chip input {
      width: 72px;
      border: 0 !important;
      padding: 0 !important;
      background: transparent !important;
      text-align: center;
      font-weight: 700;
      color: var(--ink) !important;
    }


    .action-btn {
      width: 100%;
      min-width: 0;
      justify-self: stretch;
      white-space: nowrap;
      min-height: 44px;
    }

    .action-btn.add-btn {
      min-width: 154px;
    }

    .guideline-editor {
      margin-top: 8px;
      display: grid;
      gap: 6px;
    }

    .guideline-editor-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
    }

    .guideline-editor textarea {
      min-height: 52px;
      resize: vertical;
      line-height: 1.35;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .list-shell {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(20, 35, 50, 0.045);
    }

    .list-head,
    .list-row {
      display: grid;
      grid-template-columns: minmax(300px, 2fr) 92px 92px minmax(180px, 1.05fr) 108px;
      gap: 10px;
      align-items: center;
    }

    .list-head {
      padding: 10px 14px;
      background: linear-gradient(180deg, var(--accent-soft), #fff);
      border-bottom: 1px solid var(--line);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
    }

    .list-row {
      padding: 10px 14px;
      border-bottom: 1px solid #edf2f6;
    }

    .list-row:last-child {
      border-bottom: 0;
    }

    .position-cell {
      min-width: 0;
    }

    .position-meta {
      display: flex;
      gap: 8px;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .position-type {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--accent);
      cursor: text;
    }

    .position-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.15;
      cursor: text;
    }

    .position-subtitle {
      font-size: 13px;
      color: var(--muted);
      min-height: 16px;
      cursor: text;
    }

    .row-count input,
    .row-name input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px 10px;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      color: var(--ink);
      -moz-appearance: textfield;
    }

    .row-count input::-webkit-outer-spin-button,
    .row-count input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .row-name input {
      text-align: left;
      font-size: 15px;
      font-weight: 400;
      padding: 10px 11px;
    }

    .row-action {
      display: flex;
      justify-content: flex-end;
    }

    .screen-list-empty {
      padding: 18px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .print-slips {
      display: none;
    }

    .slips {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 14px;
    }

    .slip {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(20, 35, 50, 0.045);
      min-height: 340px;
      display: flex;
      flex-direction: column;
    }

    .slip-head {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--accent-soft), #fff);
    }

    .slip-type {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .slip-title {
      margin: 0;
      font-size: 21px;
      line-height: 1.12;
    }

    .slip-subtitle {
      min-height: 16px;
      margin-top: 5px;
      font-size: 13px;
      color: var(--muted);
    }

    .slip-body {
      padding: 12px 14px 10px;
      display: grid;
      gap: 9px;
      flex: 1;
    }

    .counters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .counter-box,
    .field {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 9px 11px;
    }

    .counter-title,
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .counter-value {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      text-align: center;
      font-size: 34px;
      line-height: 1;
      font-weight: 700;
      padding: 8px 2px;
      color: var(--ink);
      -moz-appearance: textfield;
    }

    .counter-value::-webkit-outer-spin-button,
    .counter-value::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--ink);
      padding: 0;
      font-size: 15px;
    }

    .guideline {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
      background: #fcfdfe;
    }

    .guideline strong {
      color: var(--ink);
    }

    .guideline-ref {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .slip-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 14px 10px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .app-footer {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 18px 14px;
      color: var(--muted);
      font-size: 12px;
    }

    .summary-print-view {
      display: none;
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
    }

    .summary-sheet {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 18px rgba(20, 35, 50, 0.045);
    }

    .summary-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 12px;
    }

    .summary-top h2 {
      margin: 0 0 4px;
      font-size: 24px;
    }

    .summary-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .summary-box {
      border: 1.5px solid #c7d2db;
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 280px;
      background: linear-gradient(180deg, #ffffff 0%, #f6fafc 100%);
    }

    .summary-box-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .summary-box-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .summary-total-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
    }

    .summary-total-card .big {
      display: block;
      margin-top: 3px;
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
    }

    .summary-delta {
      margin-top: 10px;
      font-size: 12px;
      color: var(--ink);
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .summary-table th,
    .summary-table td {
      border: 1px solid #aebbc7;
      padding: 7px 8px;
      font-size: 12px;
      vertical-align: top;
    }

    .summary-table th {
      background: #edf3f7;
      text-align: left;
    }

    .summary-table td.num,
    .summary-table th.num {
      text-align: right;
      white-space: nowrap;
    }

    .summary-table tfoot td {
      font-weight: 700;
      background: #f5f8fa;
    }

    .summary-note {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
    }


    @media (max-width: 1180px) {
      .control-row-primary,
      .control-row-secondary,
      .control-row-actions {
        grid-template-columns: 1fr;
      }
    }

    @page {
      size: A4 portrait;
      margin: 0;
    }

    @media print {
      .toolbar-panel {
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
      }

      html, body {
        width: 210mm;
        height: auto;
        background: #fff;
      }

      .toolbar,
      .screen-only,
      .screen-list {
        display: none !important;
      }

      .app,
      .summary-print-view {
        max-width: none;
        padding: 0;
      }

      .print-slips {
        display: block !important;
      }

      body.summary-print-mode .app {
        display: none !important;
      }

      body.summary-print-mode .summary-print-view {
        display: block !important;
      }

      body.summary-print-mode .summary-sheet {
        border: 0;
        border-radius: 0;
        box-shadow: none;
        padding: 12mm;
      }

      body.summary-print-mode .summary-top {
        margin-bottom: 10px;
      }

      body.summary-print-mode .summary-table th,
      body.summary-print-mode .summary-table td {
        font-size: 11px;
      }

      body:not(.summary-print-mode) .slips {
        display: block;
        gap: 0;
      }

      .slip {
        width: 210mm;
        height: 148.5mm;
        margin: 0;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        page-break-inside: avoid;
        break-inside: avoid;
        position: relative;
        padding: 8mm 10mm 8mm 10mm;
      }

      .slip:nth-child(odd) {
        border-bottom: 1px dashed var(--print-line);
      }

      .slip:nth-child(even) {
        page-break-after: always;
      }

      .slip-head,
      .counter-box,
      .field {
        background: #fff;
      }

      .slip-head {
        border: 1px solid #b8c0c7;
        border-bottom: 0;
        padding: 10px 12px 8px;
      }

      .slip-body {
        border: 1px solid #b8c0c7;
        border-top: 0;
        padding: 10px 12px 8px;
      }

      .counter-box,
      .field {
        border-color: #bcc4cb;
      }

      .counter-value {
        color: transparent !important;
        text-shadow: none !important;
        caret-color: transparent;
      }

      .counter-value::placeholder {
        color: transparent;
      }

      .guideline {
        border-color: #c3cad1;
        background: #fff;
      }

      .slip-footer {
        padding: 8px 12px 0;
        border-top: 1px dashed #c3cad1;
        color: #56626d;
      }

      .app-footer {
        display: none !important;
      }
    }

    @media (max-width: 1220px) {
      .control-grid {
        grid-template-columns: minmax(300px, 1fr) repeat(2, minmax(120px, 0.6fr)) repeat(3, auto);
      }
    }

    @media (max-width: 980px) {
      .control-grid {
        grid-template-columns: 1fr 1fr;
      }

      .event-stack,
      .guideline-editor,
      .control-grid > .wide {
        grid-column: 1 / -1;
      }

      .list-head,
      .list-row {
        grid-template-columns: 1fr;
      }

      .list-head {
        display: none;
      }

      .list-row {
        gap: 8px;
      }

      .row-action {
        justify-content: flex-start;
      }
    }

    @media (max-width: 720px) {
      .summary {
        align-items: stretch;
      }
      .counters,
      .meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-inner">
      <div class="toolbar-panel">
        <div class="headline">
          <div>
            <h1 contenteditable="true" id="mainTitle">Assembly Counting – Munich</h1>
            <div class="sub">Compact list view on screen · 2 slips per A4 page when printing · data saved locally in your browser</div>
          </div>
          <div class="summary">
            <div class="pill">Positions: <strong id="positionsCount">0</strong></div>
            <div class="pill total-pill"><span id="sumLabel1">10.30</span> grand total: <strong id="sum1030">0</strong></div>
            <div class="pill total-pill"><span id="sumLabel2">14.30</span> grand total: <strong id="sum1430">0</strong></div>
          </div>
        </div>

        <div class="control-grid screen-only">
          <div class="control-row-primary">
            <div class="event-stack wide">
              <input type="text" id="globalEvent" placeholder="Event / date for all slips" title="Set one event/date for all slips" />
              <div class="time-row">
                <span class="time-chip">Count 1 <input type="text" id="globalTime1" placeholder="Time 1" title="Set the first counting time for all slips" /></span>
                <span class="time-chip">Count 2 <input type="text" id="globalTime2" placeholder="Time 2" title="Set the second counting time for all slips" /></span>
              </div>
            </div>
          </div>
          <div class="control-row-secondary">
            <input type="text" id="newPositionName" placeholder="New position" title="Enter a new position title" />
            <input type="text" id="newPositionSubtitle" placeholder="Optional area / description" title="Enter an optional subtitle or area" />
            <button class="primary action-btn add-btn" id="addPositionBtn" title="Add a new position">+ Add position</button>
          </div>
          <div class="control-row-actions">
            <button class="action-btn" id="exportJsonBtn" title="Export positions and settings as JSON">💾 Export JSON</button>
            <button class="action-btn" id="importJsonBtn" title="Import positions and settings from JSON">📂 Import JSON</button>
            <button class="action-btn" onclick="window.print()" title="Print all slips">🖨️ Print slips</button>
            <button class="action-btn" id="printSummaryBtn" title="Print a separate attendance summary">📊 Print summary</button>
            <button class="action-btn danger" id="resetCountsBtn" title="Reset all counting values">⚠️ Reset counts</button>
            <input type="file" id="jsonFileInput" accept=".json,application/json" hidden />
          </div>
        </div>

        <div class="guideline-editor screen-only">
          <div class="guideline-editor-label">Counting guideline for printed slips</div>
          <textarea id="globalGuidelineText" placeholder="Printed instruction text"></textarea>
        </div>
      </div>
    </div>
  </div>

  <div class="app">
    <div id="screenList" class="screen-list"></div>
    <div class="print-slips">
      <div id="slips" class="slips"></div>
    </div>
  </div>

  <div id="summaryPrintView" class="summary-print-view"></div>

  <div class="app-footer screen-only">Made with love © · v.1.13</div>

  <script>
    const STORAGE_KEY = 'assembly-counting-munich-v113';
    const LEGACY_STORAGE_KEYS = ['assembly-counting-munich-v112', 'assembly-counting-munich-v111', 'assembly-counting-munich-v110', 'assembly-counting-munich-v18', 'assembly-counting-munich-v17', 'assembly-counting-munich-v16', 'assembly-counting-munich-v15', 'counting-slips-munich-v113', 'counting-slips-munich-v112', 'counting-slips-munich-v111', 'counting-slips-munich-v110', 'counting-slips-munich-v18', 'counting-slips-munich-v17', 'counting-slips-munich-v16', 'counting-slips-munich-v15'];

    const defaultGuidelineText = 'Attendance count: Please take the count at the exact assigned time so the figures remain as accurate and synchronized as possible. Count without causing unnecessary distraction to those attending. All adults should be counted, as should young children who are listening and benefiting, even to a limited extent.';
    const defaultGuidelineRef = 'Reference: CO-23 ¶12';
    // GitHub / PWA note: keep manifest and icon files in the same folder as this HTML file.

    const defaultPositions = [
      { type: 'TC Lobby', title: 'Lobby', subtitle: 'Entire Lobby · Outdoors (if applicable) · Cloakroom · Assembly Office' },
      { type: 'Position 5', title: 'Allergic Room', subtitle: 'Counting point for allergic room / related seating area' },
      { type: 'Block', title: 'Block J', subtitle: '' },
      { type: 'Position 18', title: 'Block A', subtitle: 'Block A' },
      { type: 'Position 18', title: 'Block B', subtitle: 'Block B' },
      { type: 'Position 22', title: 'Block C', subtitle: 'Block C' },
      { type: 'Position 24', title: 'Block D', subtitle: 'Block D' },
      { type: 'Position 31', title: 'Block E+F', subtitle: 'Block E+F' },
      { type: 'TC Cafeteria', title: 'Cafeteria', subtitle: 'Cafeteria (Main Floor) + Behind Stage' },
      { type: 'Position 33', title: 'Restrooms, Parents & Children, First Aid', subtitle: 'First Aid' }
    ];

    let state = loadState();

    function makeId(seed) {
      return (crypto.randomUUID ? crypto.randomUUID() : `id-${Date.now()}-${seed}`);
    }

    function loadState() {
      const keysToTry = [STORAGE_KEY, ...LEGACY_STORAGE_KEYS];
      for (const key of keysToTry) {
        const saved = localStorage.getItem(key);
        if (!saved) continue;
        try {
          const parsed = JSON.parse(saved);
          const normalized = normalizeState(parsed);
          if (key !== STORAGE_KEY) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
          }
          return normalized;
        } catch (e) {}
      }
      return normalizeState({
        mainTitle: 'Assembly Counting – Munich',
        globalEvent: 'Assembly / Munich',
        globalTime1: '10.30',
        globalTime2: '14.30',
        globalGuidelineText: defaultGuidelineText,
        positions: defaultPositions.map((p, i) => ({
          id: makeId(i),
          ...p,
          count1030: 0,
          count1430: 0,
          name: ''
        }))
      });
    }

    function normalizeState(raw) {
      return {
        mainTitle: raw.mainTitle || 'Assembly Counting – Munich',
        globalEvent: raw.globalEvent || 'Assembly / Munich',
        globalTime1: raw.globalTime1 || '10.30',
        globalTime2: raw.globalTime2 || '14.30',
        globalGuidelineText: raw.globalGuidelineText || defaultGuidelineText,
        positions: Array.isArray(raw.positions) ? raw.positions.map((p, i) => ({
          id: p.id || makeId(i),
          type: p.type || 'Additional Position',
          title: p.title || `Position ${i + 1}`,
          subtitle: p.subtitle || '',
          count1030: Math.max(0, Number(p.count1030) || 0),
          count1430: Math.max(0, Number(p.count1430) || 0),
          name: p.name || ''
        })) : []
      };
    }

    function saveState() {
      state.mainTitle = document.getElementById('mainTitle').innerText.trim() || 'Assembly Counting – Munich';
      state.globalEvent = document.getElementById('globalEvent').value;
      state.globalTime1 = document.getElementById('globalTime1').value.trim() || '10.30';
      state.globalTime2 = document.getElementById('globalTime2').value.trim() || '14.30';
      state.globalGuidelineText = document.getElementById('globalGuidelineText').value || defaultGuidelineText;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateSummary();
    }

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function buildTimestamp() {
      const d = new Date();
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
    }

    function safeFilePart(value, fallback = 'counting-slips-munich') {
      return String(value || fallback)
        .toLowerCase()
        .replace(/[^a-z0-9]+/gi, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 60) || fallback;
    }

    function exportJson() {
      saveState();
      const payload = {
        exportedAt: new Date().toISOString(),
        app: 'Assembly Counting Munich',
        version: '1.13',
        data: state
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      const namePart = safeFilePart(state.mainTitle || 'counting-slips-munich');
      link.href = URL.createObjectURL(blob);
      link.download = `${namePart}_${buildTimestamp()}.json`;
      document.body.appendChild(link);
      link.click();
      setTimeout(() => {
        URL.revokeObjectURL(link.href);
        link.remove();
      }, 0);
    }

    function formatTimeLabel(value) {
      if (!value) return '';
      return value.replace(':', '.');
    }

    function renderSummaryView() {
      const target = document.getElementById('summaryPrintView');
      const time1 = formatTimeLabel(state.globalTime1 || '10.30');
      const time2 = formatTimeLabel(state.globalTime2 || '14.30');
      const total1 = state.positions.reduce((sum, p) => sum + (Number(p.count1030) || 0), 0);
      const total2 = state.positions.reduce((sum, p) => sum + (Number(p.count1430) || 0), 0);
      const difference = total2 - total1;
      const rows = state.positions.map((p, index) => `
        <tr>
          <td class="num">${index + 1}</td>
          <td>${escapeHtml(toDisplayTitleCase(p.type || ''))}</td>
          <td>${escapeHtml(toDisplayTitleCase(p.title || ''))}</td>
          <td>${escapeHtml(toDisplayTitleCase(p.subtitle || ''))}</td>
          <td class="num">${Number(p.count1030) || 0}</td>
          <td class="num">${Number(p.count1430) || 0}</td>
        </tr>
      `).join('');

      target.innerHTML = `
        <section class="summary-sheet">
          <div class="summary-top">
            <div>
              <h2>Attendance Summary</h2>
              <div><strong>${escapeHtml(state.mainTitle || 'Assembly Counting – Munich')}</strong></div>
              <div class="summary-sub">${escapeHtml(state.globalEvent || '') || '&nbsp;'}</div>
            </div>
            <div class="summary-box">
              <div class="summary-box-title">Grand Totals</div>
              <div class="summary-box-grid">
                <div class="summary-total-card">${escapeHtml(time1)}<span class="big">${total1}</span></div>
                <div class="summary-total-card">${escapeHtml(time2)}<span class="big">${total2}</span></div>
              </div>
              <div class="summary-delta">Difference afternoon vs. morning: <strong>${difference >= 0 ? '+' : ''}${difference}</strong></div>
            </div>
          </div>

          <table class="summary-table">
            <thead>
              <tr>
                <th class="num">#</th>
                <th>Position</th>
                <th>Section</th>
                <th>Area / description</th>
                <th class="num">${escapeHtml(time1)}</th>
                <th class="num">${escapeHtml(time2)}</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
            <tfoot>
              <tr>
                <td colspan="4">Grand Total</td>
                <td class="num">${total1}</td>
                <td class="num">${total2}</td>
              </tr>
            </tfoot>
          </table>

          <div class="summary-note">Separate print summary for attendance statistics. The counting slips themselves remain unchanged.</div>
        </section>
      `;
    }

    let summaryPrintCleanupPending = false;

    function exitSummaryPrintMode() {
      if (!summaryPrintCleanupPending) return;
      document.body.classList.remove('summary-print-mode');
      summaryPrintCleanupPending = false;
    }

    function printSummary() {
      saveState();
      renderSummaryView();
      summaryPrintCleanupPending = true;
      document.body.classList.add('summary-print-mode');
      setTimeout(() => window.print(), 50);
    }

    window.addEventListener('afterprint', exitSummaryPrintMode);
    window.addEventListener('focus', () => setTimeout(exitSummaryPrintMode, 150));

    function normalizeImportedState(raw) {
      const incoming = raw && raw.data ? raw.data : raw;
      if (!incoming || !Array.isArray(incoming.positions)) {
        throw new Error('Invalid JSON structure');
      }
      return normalizeState(incoming);
    }

    function importJsonFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          const imported = normalizeImportedState(parsed);
          if (!window.confirm('Import JSON and replace the current positions and settings?')) return;
          state = imported;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          render();
        } catch (err) {
          alert('The selected JSON file could not be imported.');
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function updateSummary() {
      const sum1030 = state.positions.reduce((sum, p) => sum + (Number(p.count1030) || 0), 0);
      const sum1430 = state.positions.reduce((sum, p) => sum + (Number(p.count1430) || 0), 0);
      document.getElementById('positionsCount').textContent = state.positions.length;
      document.getElementById('sum1030').textContent = sum1030;
      document.getElementById('sum1430').textContent = sum1430;
      document.getElementById('sumLabel1').textContent = formatTimeLabel(state.globalTime1 || '10.30');
      document.getElementById('sumLabel2').textContent = formatTimeLabel(state.globalTime2 || '14.30');
    }

    function setCount(id, field, value) {
      const pos = state.positions.find(p => p.id === id);
      if (!pos) return;
      pos[field] = Math.max(0, Number(value) || 0);
      saveState();
    }

    function setField(id, field, value) {
      const pos = state.positions.find(p => p.id === id);
      if (!pos) return;
      pos[field] = value;
      saveState();
    }

    function updateEditableField(id, field, value) {
      setField(id, field, value.trim());
    }

    function toDisplayTitleCase(value) {
      return String(value || '')
        .replace(/\s+/g, ' ')
        .trim()
        .split(' ')
        .map(word => {
          if (!word) return word;

          if (/^CO-\d+/i.test(word)) {
            return word.toUpperCase();
          }

          if (word.includes('+')) {
            return word
              .split('+')
              .map(part => {
                if (!part) return part;
                if (/^[A-Za-z]$/.test(part) || /^[A-Za-z0-9]+$/.test(part) && part === part.toUpperCase()) {
                  return part.toUpperCase();
                }
                return part.charAt(0).toUpperCase() + part.slice(1).toLowerCase();
              })
              .join('+');
          }

          if (/^[A-Z0-9]{2,}$/.test(word)) {
            return word.charAt(0) + word.slice(1).toLowerCase();
          }

          if (word === word.toUpperCase() && /[A-Z]/.test(word) && word.length > 1) {
            return word.charAt(0) + word.slice(1).toLowerCase();
          }

          return word.charAt(0).toUpperCase() + word.slice(1);
        })
        .join(' ');
    }

    function removePosition(id) {
      const pos = state.positions.find(p => p.id === id);
      const label = pos ? `${pos.type} – ${pos.title}` : 'this position';
      if (!window.confirm(`Remove ${label}?`)) return;
      state.positions = state.positions.filter(p => p.id !== id);
      render();
    }

    function addPosition() {
      const title = document.getElementById('newPositionName').value.trim();
      const subtitle = document.getElementById('newPositionSubtitle').value.trim();
      if (!title) return;

      state.positions.push({
        id: makeId(state.positions.length + 1),
        type: 'Additional Position',
        title,
        subtitle,
        count1030: 0,
        count1430: 0,
        name: ''
      });

      document.getElementById('newPositionName').value = '';
      document.getElementById('newPositionSubtitle').value = '';
      render();
    }

    function resetCounts() {
      if (!window.confirm('Reset all counts?\n\nThis will clear all entered morning and afternoon values for every position. This action cannot be undone.')) return;
      state.positions = state.positions.map(p => ({ ...p, count1030: 0, count1430: 0 }));
      render();
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/"/g, '&quot;');
    }

    function renderScreenList() {
      const wrap = document.getElementById('screenList');
      const globalTime1 = formatTimeLabel(state.globalTime1 || '10.30');
      const globalTime2 = formatTimeLabel(state.globalTime2 || '14.30');

      if (!state.positions.length) {
        wrap.innerHTML = `<div class="list-shell"><div class="screen-list-empty">No positions yet.</div></div>`;
        return;
      }

      const rows = state.positions.map((p) => `
        <div class="list-row">
          <div class="position-cell">
            <div class="position-meta">
              <span class="position-type" contenteditable="true" oninput="updateEditableField('${p.id}','type',this.innerText)">${escapeHtml(p.type)}</span>
              <span class="position-title" contenteditable="true" oninput="updateEditableField('${p.id}','title',this.innerText)">${escapeHtml(p.title)}</span>
            </div>
            <div class="position-subtitle" contenteditable="true" oninput="updateEditableField('${p.id}','subtitle',this.innerText)">${escapeHtml(p.subtitle)}</div>
          </div>
          <div class="row-count">
            <input type="number" min="0" inputmode="numeric" value="${Number(p.count1030) || 0}" oninput="setCount('${p.id}','count1030',this.value)" title="Enter the count for ${escapeAttr(globalTime1)}" />
          </div>
          <div class="row-count">
            <input type="number" min="0" inputmode="numeric" value="${Number(p.count1430) || 0}" oninput="setCount('${p.id}','count1430',this.value)" title="Enter the count for ${escapeAttr(globalTime2)}" />
          </div>
          <div class="row-name">
            <input type="text" value="${escapeAttr(p.name)}" oninput="setField('${p.id}','name',this.value)" placeholder="Brother name" title="Enter the brother's name for this slip" />
          </div>
          <div class="row-action">
            <button class="danger" onclick="removePosition('${p.id}')" title="Remove this position">Remove</button>
          </div>
        </div>
      `).join('');

      wrap.innerHTML = `
        <div class="list-shell">
          <div class="list-head">
            <div>Position / area</div>
            <div>${escapeHtml(globalTime1)}</div>
            <div>${escapeHtml(globalTime2)}</div>
            <div>Name</div>
            <div></div>
          </div>
          ${rows}
        </div>
      `;
    }

    function renderPrintSlips() {
      const wrap = document.getElementById('slips');
      const globalEvent = state.globalEvent || '';
      const globalTime1 = formatTimeLabel(state.globalTime1 || '10.30');
      const globalTime2 = formatTimeLabel(state.globalTime2 || '14.30');
      const guidelineText = state.globalGuidelineText || defaultGuidelineText;

      wrap.innerHTML = state.positions.map((p, index) => `
        <section class="slip">
          <div class="slip-head">
            <div class="slip-type">${escapeHtml(p.type)}</div>
            <h2 class="slip-title">${escapeHtml(p.title)}</h2>
            <div class="slip-subtitle">${escapeHtml(p.subtitle)}</div>
          </div>

          <div class="slip-body">
            <div class="counters">
              <div class="counter-box">
                <label class="counter-title">${escapeHtml(globalTime1)}</label>
                <input class="counter-value" type="number" min="0" inputmode="numeric" value="${Number(p.count1030) || 0}" title="Enter the count for ${escapeAttr(globalTime1)}" />
              </div>
              <div class="counter-box">
                <label class="counter-title">${escapeHtml(globalTime2)}</label>
                <input class="counter-value" type="number" min="0" inputmode="numeric" value="${Number(p.count1430) || 0}" title="Enter the count for ${escapeAttr(globalTime2)}" />
              </div>
            </div>

            <div class="meta">
              <div class="field">
                <label>Name</label>
                <input type="text" value="${escapeAttr(p.name)}" readonly />
              </div>
              <div class="field">
                <label>Date / Event</label>
                <input type="text" value="${escapeAttr(globalEvent)}" readonly />
              </div>
            </div>

            <div class="guideline">
              <strong>${escapeHtml(guidelineText.split(':')[0] || 'Attendance count')}</strong>${guidelineText.includes(':') ? escapeHtml(':' + guidelineText.split(':').slice(1).join(':')) : ''}
              <div class="guideline-ref">${escapeHtml(defaultGuidelineRef)}</div>
            </div>
          </div>

          <div class="slip-footer">
            <div>Slip ${index + 1}</div>
            <div></div>
          </div>
        </section>
      `).join('');
    }

    function render() {
      document.getElementById('mainTitle').innerText = state.mainTitle || 'Assembly Counting – Munich';
      document.getElementById('globalEvent').value = state.globalEvent || '';
      document.getElementById('globalTime1').value = state.globalTime1 || '10.30';
      document.getElementById('globalTime2').value = state.globalTime2 || '14.30';
      document.getElementById('globalGuidelineText').value = state.globalGuidelineText || defaultGuidelineText;

      renderScreenList();
      renderPrintSlips();
      renderSummaryView();
      saveState();
    }

    document.getElementById('addPositionBtn').addEventListener('click', addPosition);
    document.getElementById('exportJsonBtn').addEventListener('click', exportJson);
    document.getElementById('importJsonBtn').addEventListener('click', () => document.getElementById('jsonFileInput').click());
    document.getElementById('jsonFileInput').addEventListener('change', (e) => {
      importJsonFile(e.target.files && e.target.files[0]);
      e.target.value = '';
    });
    document.getElementById('printSummaryBtn').addEventListener('click', printSummary);
    document.getElementById('resetCountsBtn').addEventListener('click', resetCounts);
    document.getElementById('mainTitle').addEventListener('input', saveState);
    document.getElementById('globalEvent').addEventListener('input', () => {
      state.globalEvent = document.getElementById('globalEvent').value;
      saveState();
      renderScreenList();
      renderPrintSlips();
      renderSummaryView();
    });
    document.getElementById('globalTime1').addEventListener('input', () => {
      state.globalTime1 = document.getElementById('globalTime1').value || '10.30';
      saveState();
      renderScreenList();
      renderPrintSlips();
      renderSummaryView();
    });
    document.getElementById('globalTime2').addEventListener('input', () => {
      state.globalTime2 = document.getElementById('globalTime2').value || '14.30';
      saveState();
      renderScreenList();
      renderPrintSlips();
      renderSummaryView();
    });
    document.getElementById('globalGuidelineText').addEventListener('input', () => {
      state.globalGuidelineText = document.getElementById('globalGuidelineText').value || defaultGuidelineText;
      saveState();
      renderPrintSlips();
    });
    document.getElementById('newPositionName').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addPosition();
    });
    document.getElementById('newPositionSubtitle').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addPosition();
    });

    render();
  </script>
</body>
</html>
